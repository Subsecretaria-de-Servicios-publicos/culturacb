# Ocultar versión de Apache (requiere configuración en apache2.conf o security.conf)
# ServerTokens Prod
# ServerSignature Off

Listen 8200

<VirtualHost *:8200>
    DocumentRoot /home/userdes/culturacb/dist

    <Directory /home/userdes/culturacb/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA: redirige todo al index.html
        FallbackResource /index.html
    </Directory>

    # Límite para uploads de Excel (150 MB)
    LimitRequestBody 209715200

    # Headers de seguridad para el frontend (requiere mod_headers habilitado)
    # sudo a2enmod headers && sudo systemctl restart apache2
    Header always set X-Content-Type-Options      "nosniff"
    Header always set X-Frame-Options             "DENY"
    Header always set Referrer-Policy             "strict-origin-when-cross-origin"
    Header always set Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=()"
    Header always set Cross-Origin-Opener-Policy  "same-origin"
    Header always set Content-Security-Policy     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

    # API → Fastify en :4108
    # Fastify ya envía sus propios headers de seguridad; no los duplicamos aquí.
    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass        /api/ http://127.0.0.1:4108/api/
    ProxyPassReverse /api/ http://127.0.0.1:4108/api/

    ErrorLog ${APACHE_LOG_DIR}/culturacb-error.log
    CustomLog ${APACHE_LOG_DIR}/culturacb-access.log combined
</VirtualHost>
