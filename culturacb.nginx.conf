server {
    listen 8200;
    server_name _;

    root /home/userdes/culturacb/dist;
    index index.html;

    # Ocultar versión de nginx
    server_tokens off;

    # Limite para uploads de Excel (hasta 150 MB)
    client_max_body_size 200m;

    # Headers de seguridad para todas las respuestas del frontend
    add_header X-Content-Type-Options      "nosniff"                         always;
    add_header X-Frame-Options             "DENY"                            always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy  "same-origin"                     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
        always;

    # API → Fastify en :4108
    # Fastify ya envía sus propios headers de seguridad; no los duplicamos aquí.
    location /api/ {
        proxy_pass         http://127.0.0.1:4108;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend SPA → siempre index.html para rutas del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }
}
