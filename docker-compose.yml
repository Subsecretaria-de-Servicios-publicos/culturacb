services:
  postgres:
    image: postgres:16
    container_name: conciliacion_cultura_uno_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conciliacion_cultura_uno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - conciliacion_cultura_uno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conciliacion_cultura_uno"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  conciliacion_cultura_uno_pgdata:
